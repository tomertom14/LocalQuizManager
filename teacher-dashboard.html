<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Teacher Dashboard – Exam Management System</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="theme-toggle-wrapper">
        <button type="button" id="theme-toggle-btn" class="btn btn-theme-toggle">Toggle Dark Mode</button>
    </div>

    <div class="dashboard-page">
        <header class="dashboard-header">
            <div class="dashboard-header-top">
                <span class="role-badge teacher">Teacher</span>
                <h1>Teacher Dashboard</h1>
                <p id="welcome-message" class="subtitle"></p>
            </div>

            <div class="dashboard-actions">
                <a href="exam-details.html" class="btn btn-primary">Create New Exam</a>
                <button type="button" id="logout-btn" class="btn btn-secondary">Logout</button>
            </div>
        </header>

        <section class="exam-list-section">
            <h2>My Exams</h2>
            <div id="exam-list" class="exam-grid"></div>
        </section>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from './js/theme.js';

        initTheme();
        document.getElementById('theme-toggle-btn').addEventListener('click', toggleTheme);
    </script>
    <script type="module" src="js/teacher-dashboard.js"></script>
</body>
</html>
