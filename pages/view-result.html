<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Review Exam – Exam Management System</title>
    <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
    <nav class="app-nav">
        <a class="app-nav-brand" href="../index.html">📝 Exam System</a>
        <div class="app-nav-actions">
            <span class="role-badge student">Student</span>
            <button type="button" id="theme-toggle-btn" class="btn btn-theme-toggle">Toggle Dark Mode</button>
            <button type="button" id="logout-btn" class="btn btn-secondary">Logout</button>
        </div>
    </nav>

    <div class="take-exam-page">
        <div id="error-message" class="message" role="alert" hidden></div>

        <div id="result-container" hidden>
            <header class="take-exam-header">
                <h1 id="exam-title"></h1>
                <p id="exam-description" class="subtitle"></p>
            </header>

            <div id="results-summary" class="results-summary">
                <h2>Exam Review</h2>
                <p id="final-score" class="result-score"></p>
                <p id="final-percentage" class="result-percentage"></p>
                <p id="completed-date" class="review-hint"></p>
                <p class="review-hint">Green indicates correct, red indicates your incorrect choice.</p>
            </div>

            <section class="take-exam-questions">
                <div id="questions-container"></div>
            </section>

            <div class="take-exam-actions">
                <a id="back-dashboard-btn" href="student-dashboard.html" class="btn btn-primary">Back to Dashboard</a>
            </div>
        </div>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from '../js/theme.js';
        initTheme();
        document.getElementById('theme-toggle-btn').addEventListener('click', toggleTheme);
    </script>
    <script type="module" src="../js/pages/view-result.js"></script>
</body>
</html>
