<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Exam – Exam Management System</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="theme-toggle-wrapper">
        <button type="button" id="theme-toggle-btn" class="btn btn-theme-toggle">Toggle Dark Mode</button>
    </div>

    <div class="exam-details-page">
        <header class="exam-details-header">
            <span class="role-badge teacher">Teacher</span>
            <h1 id="page-title">Create New Exam</h1>
            <p id="page-subtitle" class="subtitle">Fill in the exam details and add at least one question.</p>
        </header>

        <div id="message" class="message" role="alert"></div>

        <section class="form-section">
            <h2>Exam Information</h2>

            <div class="form-group">
                <label for="title">Title</label>
                <input type="text" id="title" placeholder="e.g. Introduction to JavaScript" required />
            </div>

            <div class="form-group">
                <label for="description">Description</label>
                <textarea id="description" rows="3" placeholder="Brief description of the exam" required></textarea>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="category">Category</label>
                    <input type="text" id="category" placeholder="e.g. Web Development" required />
                </div>

                <div class="form-group">
                    <label for="accessCode">Access Code</label>
                    <input type="text" id="accessCode" placeholder="e.g. JS101" required />
                </div>
            </div>

            <div class="form-group form-group-narrow">
                <label for="durationMinutes">Duration (minutes)</label>
                <input type="number" id="durationMinutes" min="1" placeholder="e.g. 60" required />
            </div>
        </section>

        <section class="form-section">
            <h2>Question Builder</h2>

            <div class="form-group">
                <label for="questionText">Question Text</label>
                <input type="text" id="questionText" placeholder="Enter the question" />
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="answer1">Answer 1</label>
                    <input type="text" id="answer1" placeholder="First answer" />
                </div>

                <div class="form-group">
                    <label for="answer2">Answer 2</label>
                    <input type="text" id="answer2" placeholder="Second answer" />
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="answer3">Answer 3</label>
                    <input type="text" id="answer3" placeholder="Third answer" />
                </div>

                <div class="form-group">
                    <label for="answer4">Answer 4</label>
                    <input type="text" id="answer4" placeholder="Fourth answer" />
                </div>
            </div>

            <div class="form-group form-group-narrow">
                <label for="correctAnswer">Correct Answer</label>
                <select id="correctAnswer">
                    <option value="" disabled selected>Select correct answer…</option>
                    <option value="1">Answer 1</option>
                    <option value="2">Answer 2</option>
                    <option value="3">Answer 3</option>
                    <option value="4">Answer 4</option>
                </select>
            </div>

            <div class="question-builder-actions">
                <button type="button" id="add-question-btn" class="btn btn-primary btn-inline">Add Question</button>
                <button type="button" id="cancel-edit-btn" class="btn btn-secondary btn-inline" hidden>Cancel Edit</button>
            </div>
        </section>

        <section class="form-section">
            <h2>Current Questions</h2>
            <div id="questions-list" class="questions-list"></div>
        </section>

        <section id="student-results-section" class="form-section" hidden>
            <h2>Student Results</h2>
            <div class="results-table-wrapper">
                <table class="results-table">
                    <thead>
                        <tr>
                            <th>Student Name / ID</th>
                            <th>Score</th>
                            <th>Percentage</th>
                            <th>Date Completed</th>
                        </tr>
                    </thead>
                    <tbody id="student-results-body"></tbody>
                </table>
            </div>
            <p id="student-results-empty" class="empty-state" hidden>No students have taken this exam yet.</p>
        </section>

        <div class="form-actions">
            <button type="button" id="save-exam-btn" class="btn btn-primary">Save Exam</button>
            <a href="teacher-dashboard.html" class="btn btn-secondary">Cancel</a>
        </div>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from './js/theme.js';

        initTheme();
        document.getElementById('theme-toggle-btn').addEventListener('click', toggleTheme);
    </script>
    <script type="module" src="js/exam-details.js"></script>
</body>
</html>
