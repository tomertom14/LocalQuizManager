<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Take Exam – Exam Management System</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="theme-toggle-wrapper">
        <button type="button" id="theme-toggle-btn" class="btn btn-theme-toggle">Toggle Dark Mode</button>
    </div>

    <div class="take-exam-page">
        <div id="error-message" class="message error" role="alert" hidden></div>

        <div id="exam-container">
            <header class="take-exam-header">
                <span class="role-badge student">Student</span>
                <h1 id="exam-title"></h1>
                <p id="exam-description" class="subtitle"></p>
            </header>

            <section class="take-exam-questions">
                <div id="questions-container"></div>
            </section>

            <div class="take-exam-actions">
                <button type="button" id="submit-exam-btn" class="btn btn-primary">Submit Exam</button>
            </div>
        </div>

        <div id="results-container" class="results-panel" hidden>
            <h2>Exam Complete</h2>
            <p id="final-score" class="result-score"></p>
            <p id="final-percentage" class="result-percentage"></p>
            <a href="student-dashboard.html" class="btn btn-primary">Return to Dashboard</a>
        </div>
    </div>

    <script type="module">
        import { initTheme, toggleTheme } from './js/theme.js';

        initTheme();
        document.getElementById('theme-toggle-btn').addEventListener('click', toggleTheme);
    </script>
    <script type="module" src="js/take-exam.js"></script>
</body>
</html>
