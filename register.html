<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register – Exam Management System</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <div class="card">
        <h1>Create Account</h1>
        <p class="subtitle">Fill in your details to register.</p>

        <div id="message" class="message" role="alert"></div>

        <form id="register-form" novalidate>
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" placeholder="e.g. Jane Doe" required />
            </div>

            <div class="form-group">
                <label for="idNumber">ID Number</label>
                <input type="text" id="idNumber" placeholder="e.g. 208895870" required />
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="Choose a password" required />
            </div>

            <div class="form-group">
                <label for="role">Role</label>
                <select id="role" required>
                    <option value="" disabled selected>Select a role…</option>
                    <option value="student">Student</option>
                    <option value="teacher">Teacher</option>
                </select>
            </div>

            <button type="submit" class="btn btn-primary">Register</button>
        </form>

        <p class="form-footer">
            Already have an account? <a href="login.html">Login</a>
        </p>
    </div>

    <script type="module" src="js/register.js"></script>
</body>
</html>
